    const { useState, useEffect, useCallback, useMemo, createContext, useContext, createRef, useRef } = React

    const chaptersData = [
      {

            content: [

      { term: 'intro', definition: 'Introduces a new hypothesis into the proof state. Use intro h to name the hypothesis h, or intro to let Lean choose a name.', example: `-- Goal: P → Q

  rw [h]      -- rewrites a → b in the goal

theorem cases_ex (h1 : P → Q) (h2 : ¬P → Q) : Q := by
  by_cases h : P
  · exact h1 h    -- case 1: P is true

theorem push_ex (h : ¬(∃ x : Nat, P x)) : ∀ x, ¬(P x) := by
  push_neg at h
  exact h` },

      const [route, setRoute] = useState(parseHash)

      useEffect(() => {
        // Set initial hash if empty
        if (!window.location.hash || window.location.hash === '#') {
          window.location.hash = '#/introduction'
        }
        const onHashChange = () => setRoute(parseHash())
        window.addEventListener('hashchange', onHashChange)
        return () => window.removeEventListener('hashchange', onHashChange)
      }, [])

      const navigate = useCallback((to) => { window.location.hash = '#' + to }, [])

      return <RouterContext.Provider value={{ path: route.path, section: route.section, navigate }}>{children}</RouterContext.Provider>
    }

    function useRouter() { return useContext(RouterContext) }
    function useLocation() {
      const { path, section } = useRouter()
      return { pathname: path, hash: section ? '#' + section : '' }
    }

    function NavLink({ to, children, className }) {
      const { path } = useRouter()
      const isActive = path === to.replace(/^\//, '')
      const cls = typeof className === 'function' ? className({ isActive }) : className
      return <a href={'#/' + to.replace(/^\//, '')} className={cls || (isActive ? 'active' : '')}>{children}</a>
    }

    // ===== QUIZ CONTEXT =====
    const QuizContext = createContext()

    function QuizProvider({ children }) {
      const [answers, setAnswers] = useState([])

      const addAnswer = (answer) => {
        const newAnswer = { ...answer, timestamp: new Date().toISOString() }
        setAnswers(prev => {
          const idx = prev.findIndex(a => a.sectionId === answer.sectionId && a.questionIndex === answer.questionIndex)
          if (idx !== -1) {
            const copy = [...prev]; copy[idx] = newAnswer; return copy
          }
          return [...prev, newAnswer]
        })
      }

      const clearAnswers = () => setAnswers([])

      const exportAnswers = () => {
        if (answers.length === 0) return 'No quiz answers recorded yet.'
        let out = '=== LeanProof Tutorial - Quiz Answers ===\nGenerated: ' + new Date().toISOString() + '\nTotal Questions Answered: ' + answers.length + '\n\n'
        const grouped = answers.reduce((acc, a) => {
          const k = a.chapterId + ' - ' + a.chapterTitle
          ;(acc[k] = acc[k] || []).push(a)
          return acc
        }, {})
        for (const [ch, chAnswers] of Object.entries(grouped)) {
          out += '\n' + '='.repeat(60) + '\n' + ch + '\n' + '='.repeat(60) + '\n'
          const sg = chAnswers.reduce((acc, a) => {
            ;(acc[a.sectionTitle] = acc[a.sectionTitle] || []).push(a)
            return acc
          }, {})
          for (const [st, sa] of Object.entries(sg)) {
            out += '\n--- Section: ' + st + ' ---\n\n'
            for (const a of sa) {
              out += 'Q' + (a.questionIndex + 1) + ': ' + a.prompt + '\nAnswer: ' + a.selectedAnswer + '\nResult: ' + (a.isCorrect ? '\u2713 CORRECT' : '\u2717 INCORRECT') + '\nTime: ' + a.timestamp + '\n\n'
            }
          }
        }
        out += '\n' + '='.repeat(60) + '\nEND OF REPORT\n'
        return out
      }

      return <QuizContext.Provider value={{ answers, addAnswer, clearAnswers, exportAnswers }}>{children}</QuizContext.Provider>
    }

    function useQuiz() {
      const ctx = useContext(QuizContext)
      if (!ctx) throw new Error('useQuiz must be used within QuizProvider')
      return ctx
    }

    // ===== CODEBLOCK COMPONENT =====
    function CodeBlock({ code, title }) {
      const [copied, setCopied] = useState(false)
      const handleCopy = () => {
        navigator.clipboard.writeText(code).then(() => {
          setCopied(true)
          setTimeout(() => setCopied(false), 2000)
        })
      }
      return (
        <div className="code-block">
          {title && (
            <div className="code-block-header">
              <span className="code-block-lang">Lean 4</span>
              <span className="code-block-title">{title}</span>
              <button className="code-copy-btn" onClick={handleCopy} aria-label="Copy code">
                <Icon name={copied ? 'check' : 'copy'} size={14} />
                {copied ? 'Copied' : 'Copy'}
              </button>
            </div>
          )}
          <pre className="code-pre"><code>{code}</code></pre>
        </div>
      )
    }

    // ===== CONTENTBLOCK COMPONENT =====
    function ContentBlock({ block }) {
      if (block.type === 'paragraph') return <p className="content-paragraph">{block.text}</p>
      if (block.type === 'theorem') return (
        <div className="content-theorem">
          <div className="theorem-label">{block.name}</div>
          <CodeBlock code={block.code} />
        </div>
      )
      return null
    }

    // ===== EXERCISEBLOCK COMPONENT =====
    function ExerciseBlock({ section }) {
      const [selected, setSelected] = useState({})
      const [revealed, setRevealed] = useState({})
      const { addAnswer } = useQuiz()
      const { path } = useRouter()
      const chapter = chaptersData.find(ch => ch.id === path)

      useEffect(() => {
        if (chapter) {
          Object.keys(revealed).forEach(qIdxStr => {
            const qIdx = parseInt(qIdxStr)
            if (revealed[qIdx] && selected[qIdx] !== undefined) {
              const q = section.questions[qIdx]
              const opt = q.options[selected[qIdx]]
              addAnswer({
                chapterId: chapter.id, chapterTitle: chapter.title,
                sectionId: section.id, sectionTitle: section.title,
                questionIndex: qIdx, prompt: q.prompt,
                selectedAnswer: opt.text, isCorrect: opt.correct
              })
            }
          })
        }
      }, [revealed])

      const handleSelect = (qIdx, oIdx) => { if (!revealed[qIdx]) setSelected(prev => ({ ...prev, [qIdx]: oIdx })) }
      const handleReveal = (qIdx) => setRevealed(prev => ({ ...prev, [qIdx]: true }))

      return (
        <div className="exercise-block">
          {section.questions.map((q, qIdx) => (
            <div key={qIdx} className="exercise-question">
              <p className="question-prompt"><span className="question-num">Q{qIdx + 1}</span>{q.prompt}</p>
              <div className="question-options">
                {q.options.map((opt, oIdx) => {
                  const isSelected = selected[qIdx] === oIdx
                  const isRevealedNow = revealed[qIdx]
                  let cls = 'question-opt'
                  if (isSelected && !isRevealedNow) cls += ' selected'
                  if (isRevealedNow && opt.correct) cls += ' correct'
                  if (isRevealedNow && isSelected && !opt.correct) cls += ' wrong'
                  return (
                    <button key={oIdx} className={cls} onClick={() => handleSelect(qIdx, oIdx)} disabled={isRevealedNow}>
                      <span className="opt-letter">{String.fromCharCode(65 + oIdx)}</span>
                      <span className="opt-text">{opt.text}</span>
                      {isRevealedNow && opt.correct && <Icon name="check-circle" size={16} className="opt-icon icon-ok" />}
                      {isRevealedNow && isSelected && !opt.correct && <Icon name="x-circle" size={16} className="opt-icon icon-no" />}
                    </button>
                  )
                })}
              </div>
              {!revealed[qIdx] && selected[qIdx] !== undefined && (
                <button className="reveal-btn" onClick={() => handleReveal(qIdx)}>
                  <Icon name="chevron-down" size={14} /> Check Answer
                </button>
              )}
              {revealed[qIdx] && (
                <div className={'explanation ' + (selected[qIdx] !== undefined && q.options[selected[qIdx]].correct ? 'ok' : 'no')}>
                  {q.explanation}
                </div>
              )}
            </div>
          ))}
        </div>
      )
    }

    // ===== PRACTICEPROBLEM COMPONENT =====
    function PracticeProblem({ problem }) {
      const [currentStep, setCurrentStep] = useState(0)
      const [selected, setSelected] = useState({})
      const [revealed, setRevealed] = useState({})
      const [showSolution, setShowSolution] = useState(false)
      const totalSteps = problem.steps.length
      const allRevealed = Object.keys(revealed).length === totalSteps

      const handleSelect = (sIdx, oIdx) => { if (!revealed[sIdx]) setSelected(prev => ({ ...prev, [sIdx]: oIdx })) }
      const handleCheck = (sIdx) => {
        setRevealed(prev => ({ ...prev, [sIdx]: true }))
        if (sIdx < totalSteps - 1) setCurrentStep(sIdx + 1)
      }
      const handleReset = () => { setCurrentStep(0); setSelected({}); setRevealed({}); setShowSolution(false) }

      return (
        <div className="practice-problem">
          <p className="practice-desc">{problem.description}</p>
          <div className="practice-start-code"><CodeBlock code={problem.code} /></div>
          {problem.steps.map((step, sIdx) => {
            const isRevealedNow = revealed[sIdx]
            const choice = selected[sIdx]
            const isCorrect = isRevealedNow && step.options[choice]?.correct
            const isVisible = sIdx <= currentStep || allRevealed
            return (
              <div key={sIdx} className={'practice-step ' + (isVisible ? 'visible' : 'locked')}>
                <div className="practice-step-header">
                  <span className="step-badge">Line {sIdx + 1}</span>
                  <span className="step-prompt">{step.prompt}</span>
                </div>
                {isVisible && (
                  <div className="step-options">
                    {step.options.map((opt, oIdx) => {
                      let cls = 'step-opt'
                      if (choice === oIdx && !isRevealedNow) cls += ' selected'
                      if (isRevealedNow && opt.correct) cls += ' correct'
                      if (isRevealedNow && choice === oIdx && !opt.correct) cls += ' wrong'
                      return (
                        <button key={oIdx} className={cls} onClick={() => handleSelect(sIdx, oIdx)} disabled={isRevealedNow}>
                          <span className="step-letter">{String.fromCharCode(65 + oIdx)}</span>
                          <code className="step-code">{opt.text}</code>
                          {isRevealedNow && opt.correct && <Icon name="check-circle" size={14} className="opt-icon icon-ok" />}
                          {isRevealedNow && choice === oIdx && !opt.correct && <Icon name="x-circle" size={14} className="opt-icon icon-no" />}
                        </button>
                      )
                    })}
                    {!isRevealedNow && choice !== undefined && (
                      <button className="step-check-btn" onClick={() => handleCheck(sIdx)}>
                        Check & Continue <Icon name="chevron-down" size={14} />
                      </button>
                    )}
                    {isRevealedNow && (
                      <div className={'step-feedback ' + (isCorrect ? 'ok' : 'no')}>{step.options[choice].text}</div>
                    )}
                  </div>
                )}
              </div>
            )
          })}
          {allRevealed && (
            <div className="practice-complete">
              <button className="btn btn-ghost" onClick={() => setShowSolution(!showSolution)}>
                <Icon name="chevron-down" size={14} /> {showSolution ? 'Hide' : 'Show'} Full Solution
              </button>
              {showSolution && <div className="practice-solution"><CodeBlock code={problem.fullCode} /></div>}
              <button className="btn btn-ghost" onClick={handleReset}>
                <Icon name="rotate" size={14} /> Try Again
              </button>
            </div>
          )}
        </div>
      )
    }

    // ===== PRACTICEBLOCK COMPONENT =====
    function PracticeBlock({ section }) {
      const [activeTab, setActiveTab] = useState(0)
      const problems = section.problems
      return (
        <div className="practice-block">
          <div className="practice-tabs">
            {problems.map((p, i) => (
              <button key={p.id} className={'practice-tab ' + (i === activeTab ? 'active' : '')} onClick={() => setActiveTab(i)}>{p.title}</button>
            ))}
          </div>
          {problems.map((p, i) => i === activeTab ? <PracticeProblem key={p.id} problem={p} /> : null)}
        </div>
      )
    }

    // ===== GLOSSARYPANEL COMPONENT =====
    function GlossaryPanel() {
      const [search, setSearch] = useState('')
      const [expanded, setExpanded] = useState({})
      const filtered = glossaryData.filter(e => e.term.toLowerCase().includes(search.toLowerCase()) || e.definition.toLowerCase().includes(search.toLowerCase()))
      const toggle = (term) => setExpanded(prev => ({ ...prev, [term]: !prev[term] }))
      return (
        <div className="glossary-panel">
          <div className="glossary-search">
            <Icon name="search" size={14} />
            <input type="text" placeholder="Search tactics..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div className="glossary-list">
            {filtered.map(entry => (
              <div key={entry.term} className="glossary-entry">
                <button className="glossary-term" onClick={() => toggle(entry.term)}>
                  {expanded[entry.term] ? <Icon name="chevron-up" size={14} /> : <Icon name="chevron-down" size={14} />}
                  <code>{entry.term}</code>
                </button>
                {expanded[entry.term] && (
                  <div className="glossary-body">
                    <p className="glossary-def">{entry.definition}</p>
                    {entry.example && (
                      <div className="glossary-example">
                        <div className="glossary-example-label">Example</div>
                        <pre className="glossary-pre"><code>{entry.example}</code></pre>
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )
    }

    // ===== GLOSSARYPAGE COMPONENT =====
    function GlossaryPage() {
      return (
        <div className="chapter-page">
          <div className="chapter-header">
            <div className="chapter-number">Reference</div>
            <h1>Tactic Glossary</h1>
          </div>
          <div className="chapter-content"><GlossaryPanel /></div>
        </div>
      )
    }

    // ===== EXPORTANSWERS COMPONENT =====
    function ExportAnswers() {
      const { answers, exportAnswers } = useQuiz()
      const handleExport = () => {
        const blob = new Blob([exportAnswers()], { type: 'text/plain' })
        const url = URL.createObjectURL(blob)
        const link = document.createElement('a')
        link.href = url
        link.download = 'leanproof-answers-' + new Date().toISOString().split('T')[0] + '.txt'
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url)
      }
      return (
        <div className="export-section">
          <div className="export-card">
            <h3>Export Your Quiz Answers</h3>
            <p className="export-description">You have answered <strong>{answers.length}</strong> question{answers.length !== 1 ? 's' : ''} across all chapters. Export your answers to submit for review.</p>
            <button className="btn btn-primary export-btn" onClick={handleExport} disabled={answers.length === 0}>
              <Icon name="download" size={16} /> Export Answers
            </button>
            {answers.length === 0 && <p className="export-hint">Complete some quiz questions to enable export</p>}
          </div>
        </div>
      )
    }

    // ===== CHAPTERPAGE COMPONENT =====
    function ChapterPage() {
      const { path } = useRouter()
      const chapter = chaptersData.find(ch => ch.id === path)

      if (!chapter) {
        return (
          <div className="chapter-page">
            <p>Chapter not found. <a href="#/introduction">Go to Introduction</a></p>
          </div>
        )
      }

      return (
        <div className="chapter-page">
          <div className="chapter-header">
            <div className="chapter-number">Chapter {chapter.number}</div>
            <h1>{chapter.title}</h1>
            <div className="chapter-tags">
              {chapter.tacticTags.map(tag => <code key={tag} className="chapter-tag">{tag}</code>)}
            </div>
          </div>
          <div className="chapter-content">
            {chapter.sections.map(section => (
              <section key={section.id} id={section.id} className="section">
                <h2>{section.title}</h2>
                {section.kind === 'explanation' && section.content?.map((block, i) => <ContentBlock key={i} block={block} />)}
                {section.kind === 'exercise' && (
                  <>
                    {section.intro?.map((block, i) => <ContentBlock key={i} block={block} />)}
                    <ExerciseBlock section={section} />
                  </>
                )}
                {section.kind === 'practice' && (
                  <>
                    {section.intro?.map((block, i) => <ContentBlock key={i} block={block} />)}
                    <PracticeBlock section={section} />
                  </>
                )}
                <div className="section-divider" />
              </section>
            ))}
            <ExportAnswers />
          </div>
        </div>
      )
    }

    // ===== APPLAYOUT COMPONENT =====
    function AppLayout() {
      const [sidebarOpen, setSidebarOpen] = useState(false)
      const { path, section: hashSection, navigate } = useRouter()

      useEffect(() => {
        if (hashSection) {
          setTimeout(() => {
            document.getElementById(hashSection)?.scrollIntoView({ behavior: 'smooth' })
          }, 100)
        }
      }, [path, hashSection])

      // Close sidebar on route change
      useEffect(() => { setSidebarOpen(false) }, [path])

      return (
        <div className="app-layout">
          <header className="app-header">
            <div className="header-inner">
              <div className="header-left">
                <button className="menu-toggle" onClick={() => setSidebarOpen(!sidebarOpen)} aria-label="Toggle navigation">
                  {sidebarOpen ? <Icon name="x" size={20} /> : <Icon name="menu" size={20} />}
                </button>
                <a href="#/introduction" className="logo">LeanProof</a>
              </div>
              <nav className="header-chapters">
                {chaptersData.map(ch => (
                  <NavLink key={ch.id} to={ch.id}>{ch.number}. {ch.title}</NavLink>
                ))}
                <NavLink to="glossary">
                  <Icon name="book" size={14} /> Glossary
                </NavLink>
              </nav>
            </div>
          </header>

          {sidebarOpen && <div className="sidebar-overlay" onClick={() => setSidebarOpen(false)} />}

          <aside className={'sidebar' + (sidebarOpen ? ' open' : '')}>
            <div className="sidebar-inner">
              {chaptersData.map(chapter => (
                <div key={chapter.id} className="sidebar-chapter">
                  <div className="sidebar-chapter-title">{chapter.number}. {chapter.title}</div>
                  {chapter.sections.map(sec => (
                    <a
                      key={sec.id}
                      href={'#/' + chapter.id + '#' + sec.id}
                      className={'sidebar-section' + (path === chapter.id && hashSection === sec.id ? ' current' : '')}
                    >
                      {sec.kind === 'exercise' && <span className="sidebar-q-dot" />}
                      {sec.title}
                    </a>
                  ))}
                </div>
              ))}
              <div className="sidebar-chapter">
                <a href="#/glossary" className="sidebar-chapter-title">Tactic Glossary</a>
              </div>
            </div>
          </aside>

          <main className="app-main">
            {path === 'glossary' ? <GlossaryPage /> : <ChapterPage />}
          </main>
        </div>
      )
    }

    // ===== APP =====
    function App() {
      return (
        <QuizProvider>
          <SimpleRouter>
            <AppLayout />
          </SimpleRouter>
        </QuizProvider>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
